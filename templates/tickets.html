<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="utf-8">
<title>Tickets — frshty</title>
<script src="/static/tailwind.js"></script>
<script defer src="/static/nav-gate.js"></script>
<style>
body { font-family: 'SF Mono', 'Cascadia Code', monospace; background: #0a0a0a; color: #e0e0e0; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; }
.link { color: #60a5fa; }
.link:hover { text-decoration: underline; }
.col { min-width: 180px; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
.badge-new { background: #1e3a5f; color: #93c5fd; }
.badge-planning { background: #713f12; color: #fde047; }
.badge-reviewing { background: #713f12; color: #fde047; }
.badge-pr_ready { background: #14532d; color: #86efac; }
.badge-pr_created { background: #14532d; color: #86efac; }
.badge-in_review { background: #1e3a5f; color: #93c5fd; }
.badge-pr_failed { background: #7f1d1d; color: #fca5a5; }
.badge-merged { background: #14532d; color: #86efac; }
nav a { color: #888; padding: 4px 12px; border-radius: 4px; }
nav a:hover, nav a.active { color: #fff; background: #222; }
</style>
</head>
<body class="p-4 max-w-7xl mx-auto">
<header class="flex items-center gap-4 mb-4">
    <h1 class="text-lg font-bold">Tickets</h1>
    <nav class="flex gap-1 text-sm">
        <a href="/">Feed</a>
        <a href="/reviews">Reviews</a>
        <a href="/tickets" class="active">Tickets</a>
        <a href="/scheduled">Scheduled</a>
        <a href="/slack">Slack</a>
        <a href="/timesheet">Timesheet</a>
        <a href="/billing">Billing</a>
        <a href="/config">Config</a>
    </nav>
</header>

<div id="board" class="flex gap-4 overflow-x-auto pb-4"></div>

<script>
const COLUMNS = ['new', 'planning', 'reviewing', 'pr_ready', 'pr_created', 'in_review', 'pr_failed', 'merged'];
const HELP = {
    pr_ready: 'Branch pushed and work finished. Waiting for the scheduler (or auto_pr) to open the PR on the platform.',
    pr_created: 'PR has just been opened. Transient — next cycle it becomes in_review (or merged if already merged).',
    in_review: 'PR open, not all merged. Each cycle: poll CI, resolve conflicts, read review comments, check merge state.',
    pr_failed: 'CI or conflict resolution exhausted retries. Needs manual intervention — restart the ticket to retry.',
};

async function load() {
    const resp = await fetch('/api/tickets/list');
    const tickets = await resp.json();
    const board = document.getElementById('board');
    board.innerHTML = COLUMNS.filter(col =>
        Object.values(tickets).some(t => t.status === col)
    ).map(col => {
        const items = Object.entries(tickets)
            .filter(([_, t]) => t.status === col)
            .map(([key, t]) => `
                <div class="card p-3 mb-2 hover:border-gray-500 transition-colors relative group">
                    <a href="/tickets/${key}" class="block">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm">${key}</span>
                            <span class="badge badge-${t.status}">${t.status}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-1">${t.branch || ''}</div>
                        ${(t.prs || []).map(p => p.author).filter(a => a).length ? `<div class="text-xs text-gray-500 mt-1">by ${[...new Set((t.prs || []).map(p => p.author).filter(a => a))].join(', ')}</div>` : ''}
                        ${t.pr_scheduled_at ? `<div class="text-xs text-yellow-400 mt-1">PR scheduled ${new Date(t.pr_scheduled_at).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}</div>` : ''}
                        ${t.external_status ? `<div class="text-xs text-gray-500 mt-1">${t.external_status}</div>` : ''}
                    </a>
                    <button onclick="discard('${key}')" class="absolute top-2 right-2 text-gray-600 hover:text-red-400 text-xs hidden group-hover:block">discard</button>
                </div>
            `).join('');
        const help = HELP[col] ? `<span class="text-gray-600 hover:text-gray-300 cursor-help ml-1" title="${HELP[col]}">&#9432;</span>` : '';
        return `<div class="col flex-1">
            <div class="text-xs font-bold text-gray-500 uppercase mb-2">${col}${help}</div>
            ${items}
        </div>`;
    }).join('');
}
async function discard(key) {
    if (!confirm(`Discard ${key}? It will be picked up fresh on next poll.`)) return;
    await fetch(`/api/tickets/${key}`, { method: 'DELETE' });
    load();
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
