<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="utf-8">
<title>Reviews — frshty</title>
<script src="/static/tailwind.js"></script>
<script defer src="/static/nav-gate.js"></script>
<style>
body { font-family: 'SF Mono', 'Cascadia Code', monospace; background: #0a0a0a; color: #e0e0e0; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; }
.link { color: #60a5fa; }
.link:hover { text-decoration: underline; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
.badge-red { background: #991b1b; color: #fca5a5; }
.badge-green { background: #14532d; color: #86efac; }
.badge-yellow { background: #713f12; color: #fde047; }
.badge-purple { background: #3b1e5f; color: #d8b4fe; }
nav a { color: #888; padding: 4px 12px; border-radius: 4px; }
nav a:hover, nav a.active { color: #fff; background: #222; }
.pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body class="p-4 max-w-7xl mx-auto">
<header class="flex items-center gap-4 mb-4">
    <div class="flex items-center gap-2">
        <h1 class="text-lg font-bold">Reviews</h1>
        <span class="text-xs font-mono bg-gray-800 text-gray-300 px-2 py-1 rounded border border-gray-700" id="instance-badge"></span>
    </div>
    <nav class="flex gap-1 text-sm">
        <a href="/">Feed</a>
        <a href="/global">Global</a>
        <a href="/reviews" class="active">Reviews</a>
        <a href="/tickets">Tickets</a>
        <a href="/scheduled">Scheduled</a>
        <a href="/slack">Slack</a>
        <a href="/timesheet">Timesheet</a>
        <a href="/billing">Billing</a>
        <a href="/config">Config</a>
    </nav>
</header>

<div class="card p-3 mb-4 flex gap-2 items-center">
    <input type="text" id="pr-url" placeholder="paste PR url to review" class="flex-1 bg-transparent border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-200 focus:border-blue-500 focus:outline-none" />
    <button id="submit-btn" onclick="submitReview()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-1.5 rounded cursor-pointer whitespace-nowrap">review</button>
</div>

<div id="pending-reviews" class="space-y-2 mb-2"></div>
<div id="reviews-list" class="space-y-2"></div>

<script>
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function extractTicket(branch) {
    const m = branch.match(/dev-(\d+)/i);
    return m ? `DEV-${m[1]}` : null;
}

function ticketLabel(branch) {
    return branch.replace(/^[A-Za-z]+-dev-\d+-?/i, '').replace(/^dev-\d+-?/i, '').replace(/-/g, ' ').trim() || branch;
}

async function load() {
    const resp = await fetch('/api/reviews');
    const reviews = await resp.json();
    const container = document.getElementById('reviews-list');
    if (!reviews.length) {
        container.innerHTML = '<div class="text-gray-600">No reviews queued.</div>';
        return;
    }

    const groups = {};
    const ungrouped = [];
    for (const r of reviews) {
        const ticket = extractTicket(r.branch);
        if (ticket) {
            if (!groups[ticket]) groups[ticket] = { label: ticketLabel(r.branch), items: [], authors: new Set() };
            groups[ticket].items.push(r);
            if (r.author) groups[ticket].authors.add(r.author);
        } else {
            ungrouped.push(r);
        }
    }

    let html = '';
    for (const [ticket, group] of Object.entries(groups)) {
        const authors = [...group.authors].join(', ');
        const authorHtml = authors ? ` <span class="text-gray-500">by ${esc(authors)}</span>` : '';
        html += `<div class="mb-4">
            <div class="text-sm text-gray-400 mb-1">${ticket} — ${group.label}${authorHtml}</div>
            <div class="space-y-1">${group.items.map(prCard).join('')}</div>
        </div>`;
    }
    if (ungrouped.length) {
        html += `<div class="mb-4">
            <div class="text-sm text-gray-400 mb-1">Other</div>
            <div class="space-y-1">${ungrouped.map(prCard).join('')}</div>
        </div>`;
    }
    container.innerHTML = html;
    loadBBComments(reviews);
    for (const r of reviews) {
        const key = `${r.repo}/${r.pr_id}`;
        if (_pending[key]) delete _pending[key];
    }
    renderPending();
}

function timeAgo(iso) {
    if (!iso) return '';
    const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (secs < 60) return 'just now';
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
}

function prCard(r) {
    const reviewing = r.branch && r.branch.startsWith('pending-');
    const verdictCls = reviewing ? 'badge-yellow' : r.verdict === 'changes_requested' ? 'badge-red' : r.verdict === 'approved' ? 'badge-green' : 'badge-yellow';
    const label = reviewing ? 'reviewing <span class="pulse">●</span>' : (r.verdict ? `llm: ${r.verdict}` : 'pending');
    const cardId = `bb-${r.repo}-${r.pr_id}`;
    const borderCls = reviewing ? 'border-l-2 border-l-blue-500' : '';
    const stale = !reviewing && r.updated_on && r.reviewed_at && new Date(r.updated_on) > new Date(r.reviewed_at);
    const updated = r.updated_on ? timeAgo(r.updated_on) : '';
    const youBadge = r.approved_by_me ? '<span class="badge badge-purple ml-1" title="you approved this PR on the platform">✓ you</span>' : '';
    return `<div class="card p-3 flex items-center justify-between ${borderCls}">
        <div>
            <a href="/reviews/${r.repo}/${r.pr_id}" class="link font-bold">${r.repo} #${r.pr_id}</a>
            <span class="badge ${verdictCls} ml-2" title="LLM verdict">${label}</span>
            ${youBadge}
            ${updated ? `<span class="text-gray-500 ml-2 text-xs">${updated}</span>` : ''}
            ${stale ? '<span class="badge badge-yellow ml-1">stale</span>' : ''}
            <span id="${cardId}" class="text-gray-600 ml-2 text-xs"></span>
        </div>
        <a href="${r.pr_url}" target="_blank" class="link text-sm">[→ PR]</a>
    </div>`;
}

async function loadBBComments(reviews) {
    for (const r of reviews) {
        if (!r.pr_id) continue;
        fetch(`/api/reviews/${r.repo}/${r.pr_id}/bb-comments`)
            .then(res => res.json())
            .then(data => {
                const el = document.getElementById(`bb-${r.repo}-${r.pr_id}`);
                if (!el || !data.count) return;
                el.textContent = `💬 ${data.count}` + (data.initials.length ? ` · ${data.initials.join(', ')}` : '');
                el.classList.replace('text-gray-600', 'text-gray-400');
            })
            .catch(() => {});
    }
}

const _pending = {};

async function submitReview() {
    const input = document.getElementById('pr-url');
    const btn = document.getElementById('submit-btn');
    const url = input.value.trim();
    if (!url) return;
    btn.textContent = 'submitting...';
    btn.disabled = true;
    const resp = await fetch('/api/reviews/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url})
    });
    const result = await resp.json();
    if (result.status === 'started') {
        _pending[`${result.repo}/${result.pr_id}`] = {repo: result.repo.split('/').pop(), full_repo: result.repo, pr_id: result.pr_id, url: url};
        input.value = '';
        btn.textContent = 'review';
        btn.disabled = false;
        renderPending();
    } else {
        btn.textContent = result.error || 'failed';
        setTimeout(() => { btn.textContent = 'review'; btn.disabled = false; }, 2000);
    }
}

function renderPending() {
    const el = document.getElementById('pending-reviews');
    const keys = Object.keys(_pending);
    if (!keys.length) { el.innerHTML = ''; return; }
    el.innerHTML = keys.map(k => {
        const p = _pending[k];
        return `<div class="card p-3 flex items-center justify-between border-l-2 border-l-blue-500">
            <div>
                <span class="text-sm font-bold text-blue-400">${esc(p.full_repo)} #${p.pr_id}</span>
                <span class="badge badge-yellow ml-2">reviewing <span class="pulse">●</span></span>
            </div>
            <a href="${esc(p.url)}" target="_blank" class="link text-sm">[→ PR]</a>
        </div>`;
    }).join('');
}

document.getElementById('pr-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitReview();
});

load();
</script>
</body>
</html>
