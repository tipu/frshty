<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="utf-8">
<title>Billing — frshty</title>
<script src="/static/tailwind.js"></script>
<script defer src="/static/nav-gate.js"></script>
<style>
body { font-family: 'SF Mono', 'Cascadia Code', monospace; background: #0a0a0a; color: #e0e0e0; }
nav a { color: #888; padding: 4px 12px; border-radius: 4px; }
nav a:hover, nav a.active { color: #fff; background: #222; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; }
.subtitle { font-size: 13px; color: #666; }
.legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }
.week-row { display: grid; grid-template-columns: 130px repeat(5, 1fr) 280px; gap: 2px; margin-bottom: 2px; align-items: stretch; }
.week-label { font-size: 12px; color: #666; display: flex; align-items: center; padding-right: 12px; justify-content: flex-end; cursor: pointer; }
.day { padding: 10px 8px; font-size: 12px; text-align: center; border-radius: 4px; min-height: 52px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; user-select: none; transition: opacity 0.1s; }
.day:hover { opacity: 0.8; }
.day .date { font-weight: 600; font-size: 13px; }
.day .label { font-size: 10px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.day.empty { cursor: pointer; background: transparent; }
.day.empty:hover { opacity: 0.6; }
.work { background: #1a2a1a; color: #4ade80; }
.vacation { background: #2a1a2a; color: #c084fc; }
.closed { background: #1a1a2a; color: #60a5fa; }
.invoice-cell { display: flex; align-items: center; padding-left: 12px; font-size: 12px; position: relative; }
.invoice-tag { background: #1a2a1a; border: 1px solid #2d4a2d; border-radius: 4px; padding: 6px 10px; color: #4ade80; font-size: 11px; line-height: 1.4; cursor: pointer; }
.invoice-tag.missing { background: #2a1a1a; border-color: #4a2d2d; color: #f87171; }
.invoice-tag.pending { background: #1a1a2a; border-color: #2d2d4a; color: #60a5fa; }
.header-row { display: grid; grid-template-columns: 130px repeat(5, 1fr) 280px; gap: 2px; margin-bottom: 4px; }
.header-row div { text-align: center; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; padding: 4px; }
.divider { height: 1px; background: #222; margin: 16px 0; }
.summary h2 { font-size: 14px; color: #f87171; margin-top: 24px; margin-bottom: 12px; font-weight: 600; }
.summary-table { width: 100%; max-width: 700px; border-collapse: collapse; font-size: 13px; margin-bottom: 30px; }
.summary-table th { text-align: left; padding: 6px 10px; border-bottom: 1px solid #333; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-table td { padding: 6px 10px; border-bottom: 1px solid #1a1a1a; }
.summary-table tr.total td { border-top: 1px solid #333; font-weight: 700; color: #f87171; }
.amount { text-align: right; }
.inv-form { position: absolute; right: 0; top: 100%; z-index: 10; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 10px; width: 360px; display: flex; flex-direction: column; gap: 6px; }
.inv-form .preview { max-height: 200px; overflow-y: auto; font-size: 11px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 4px; }
.inv-form .preview > div { padding: 4px 6px; border-bottom: 1px solid #1a1a1a; white-space: pre-wrap; word-break: break-word; color: #d0d0d0; }
.inv-form .preview > div:last-child { border-bottom: none; }
.inv-form .preview > div.muted { color: #666; font-style: italic; }
.inv-form input { font-family: inherit; font-size: 12px; background: #111; border: 1px solid #333; color: #e0e0e0; padding: 5px 8px; border-radius: 4px; }
.inv-form .inv-form-row { display: flex; gap: 6px; }
.inv-form button { font-family: inherit; font-size: 11px; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; }
.inv-form .btn-save { background: #2d4a2d; color: #4ade80; }
.inv-form .btn-cancel { background: #333; color: #999; }
.msg { padding: 5px 12px; border-radius: 4px; font-size: 12px; display: inline-block; }
.msg-ok { background: #14532d; color: #86efac; }
.msg-err { background: #7f1d1d; color: #fca5a5; }
</style>
</head>
<body class="p-4 max-w-7xl mx-auto">
<header class="flex items-center gap-4 mb-4">
    <div class="flex items-center gap-2"><h1 class="text-lg font-bold">Billing</h1><span class="text-xs font-mono bg-gray-800 text-gray-300 px-2 py-1 rounded border border-gray-700" id="instance-badge"></span></div>
    <nav class="flex gap-1 text-sm">
        <a href="/">Feed</a>
        <a href="/global">Global</a>
        <a href="/reviews">Reviews</a>
        <a href="/tickets">Tickets</a>
        <a href="/scheduled">Scheduled</a>
        <a href="/slack">Slack</a>
        <a href="/timesheet">Timesheet</a>
        <a href="/billing" class="active">Billing</a>
        <a href="/config">Config</a>
    </nav>
</header>

<div class="card p-4 mb-4">
    <div id="client-header" class="subtitle">Loading…</div>
    <div id="creds-warn" class="text-xs text-red-400 mt-1 hidden"></div>
    <div id="schedule-panel" class="text-xs text-gray-400 mt-2 hidden"></div>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1a2a1a;border:1px solid #2d4a2d"></div> Work day</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a1a2a;border:1px solid #4a2d4a"></div> Vacation</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a1a2a;border:1px solid #2d2d4a"></div> Client closed</div>
    <span id="msg" class="msg"></span>
</div>

<div id="calendar"></div>

<script>
let client = null;
let entries = [];
let invoices = [];
let nextInvNumber = '';
let openForm = null;

async function api(path, opts) {
    const r = await fetch(path, opts);
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw Object.assign(new Error(e.error || `HTTP ${r.status}`), {status: r.status, data: e}); }
    return r.json();
}

async function load() {
    client = await api('/api/billing/client');
    renderHeader();
    const calls = [api('/api/billing/entries'), api('/api/billing/invoices'), api('/api/billing/schedule-status')];
    if (client.billcom_available) calls.push(api('/api/billing/next-invoice-number'));
    const [e, inv, sched, n] = await Promise.all(calls);
    entries = e; invoices = inv; nextInvNumber = n ? n.number : '';
    renderSchedule(sched);
    renderCalendar();
}

function renderSchedule(sched) {
    const panel = document.getElementById('schedule-panel');
    if (!sched || !sched.enabled) { panel.classList.add('hidden'); return; }
    const cadence = sched.freq === 'monthly' ? 'Monthly' : 'Weekly';
    const fmtDateTime = iso => new Date(iso).toLocaleString('en-US', {weekday: 'short',
        month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
        timeZone: 'America/Los_Angeles', timeZoneName: 'short'});
    const fmtDate = ymd => new Date(ymd + 'T12:00:00').toLocaleDateString('en-US',
        {weekday: 'short', month: 'short', day: 'numeric'});
    const nextFire = sched.next_fire ? fmtDateTime(sched.next_fire) : 'n/a';
    let last = 'never';
    if (sched.last_run) {
        const lr = sched.last_run;
        const period = (lr.start && lr.end) ? ` (${fmtDate(lr.start)} – ${fmtDate(lr.end)})` : '';
        const num = lr.number ? ` ${lr.number}` : '';
        const err = lr.error ? ` — ${lr.error}` : '';
        last = `${fmtDate(lr.date)} · ${lr.result}${num}${period}${err}`;
    }
    panel.textContent = `Schedule: ${cadence} · Next: ${nextFire} · Last: ${last}`;
    panel.classList.remove('hidden');
}

function renderHeader() {
    document.title = `Billing · ${client.name || 'frshty'}`;
    const freq = client.billing_freq === 'monthly' ? 'Monthly billing' : 'Weekly billing';
    const extras = Object.entries(client.extras || {}).map(([k, v]) => `$${v}/mo ${k.replace(/_/g, ' ')}`).join(' · ');
    document.getElementById('client-header').innerHTML =
        `${client.name || '<span class="text-red-400">No [billing] in config</span>'} · $${client.rate}/hr · ${freq}${extras ? ' · ' + extras : ''}`;
    const warn = document.getElementById('creds-warn');
    if (!client.billcom_available) {
        warn.textContent = 'bill.com credentials missing (BILLCOM_DEV_KEY/EMAIL/PASSWORD/ORG_ID). Invoice creation disabled.';
        warn.classList.remove('hidden');
    } else if (!client.billcom_customer_id) {
        warn.textContent = '[billing].billcom_customer_id not set. Invoice creation disabled.';
        warn.classList.remove('hidden');
    }
}

function getMonday(d) { const dt = new Date(d); const day = dt.getUTCDay(); const diff = day === 0 ? -6 : 1 - day; dt.setUTCDate(dt.getUTCDate() + diff); return dt; }
function fmtDate(d) { return d.toISOString().slice(0, 10); }
function shortMonth(d) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()]; }

function renderCalendar() {
    const cal = document.getElementById('calendar');
    const entryMap = {};
    entries.forEach(e => { entryMap[e.date] = e; });

    const now = new Date();
    const threeMonthsAgo = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() - 3, 1));
    const endOfThisWeek = getMonday(now); endOfThisWeek.setUTCDate(endOfThisWeek.getUTCDate() + 7);
    const firstMonday = getMonday(threeMonthsAgo);
    const weeks = [];
    let cur = new Date(firstMonday);
    while (cur < endOfThisWeek) { weeks.push(new Date(cur)); cur.setUTCDate(cur.getUTCDate() + 7); }

    const isMonthly = client.billing_freq === 'monthly';
    let prevMonth = null;
    let html = `<div class="header-row"><div></div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div></div></div>`;

    weeks.forEach((monday, wIdx) => {
        const fri = new Date(monday); fri.setUTCDate(fri.getUTCDate() + 4);
        const monMonth = monday.getUTCMonth();
        if (prevMonth !== null && monMonth !== prevMonth) html += `<div class="divider"></div>`;
        prevMonth = monMonth;

        const label = `${shortMonth(monday)} ${monday.getUTCDate()} – ${monday.getUTCMonth() !== fri.getUTCMonth() ? shortMonth(fri) + ' ' : ''}${fri.getUTCDate()}`;
        html += `<div class="week-row"><div class="week-label">${label}</div>`;

        let weekWorkDays = 0, weekHours = 0;
        for (let i = 0; i < 5; i++) {
            const d = new Date(monday); d.setUTCDate(d.getUTCDate() + i);
            const ds = fmtDate(d);
            const entry = entryMap[ds];
            const dayNum = d.getUTCDate();
            const type = entry ? entry.type : 'work';
            const hours = entry ? (entry.hours || 0) : 8;
            const lbl = type === 'vacation' ? '<span class="label">Vacation</span>' : type === 'closed' ? '<span class="label">Closed</span>' : '';
            if (type === 'work') { weekWorkDays++; weekHours += hours; }
            html += `<div class="day ${type}" onclick="cycleDay('${ds}')" title="${ds}"><span class="date">${dayNum}</span>${lbl}</div>`;
        }

        const weekStart = fmtDate(monday), weekEnd = fmtDate(fri);
        const inv = invoices.find(v => v.start && v.end && v.start <= weekEnd && v.end >= weekStart);

        if (isMonthly) {
            if (inv) {
                const showTag = inv.end >= weekStart && inv.end <= weekEnd;
                if (showTag) {
                    const cls = inv.status === 'paid' ? '' : ' pending';
                    html += `<div class="invoice-cell"><div class="invoice-tag${cls}">${inv.number} · $${inv.amount.toLocaleString()}<br>${inv.status}</div></div>`;
                } else html += `<div class="invoice-cell"></div>`;
            } else {
                const nextWeek = weeks[wIdx + 1];
                const isLastWeekOfMonth = !nextWeek || nextWeek.getUTCMonth() !== monday.getUTCMonth();
                if (isLastWeekOfMonth) {
                    let monthDays = 0, monthHours = 0;
                    weeks.filter(w => w.getUTCMonth() === monday.getUTCMonth()).forEach(w => {
                        const ws = fmtDate(w);
                        const wf = new Date(w); wf.setUTCDate(wf.getUTCDate() + 4);
                        const we = fmtDate(wf);
                        if (invoices.find(v => v.start && v.end && v.start <= we && v.end >= ws)) return;
                        for (let j = 0; j < 5; j++) {
                            const dd = new Date(w); dd.setUTCDate(dd.getUTCDate() + j);
                            const ee = entryMap[fmtDate(dd)];
                            const type = ee ? ee.type : 'work';
                            const hrs = ee ? (ee.hours || 0) : 8;
                            if (type === 'work') { monthDays++; monthHours += hrs; }
                        }
                    });
                    if (monthDays > 0) {
                        const monthStart = fmtDate(new Date(Date.UTC(monday.getUTCFullYear(), monday.getUTCMonth(), 1)));
                        const monthEnd = fmtDate(new Date(Date.UTC(monday.getUTCFullYear(), monday.getUTCMonth() + 1, 0)));
                        const est = monthHours * client.rate + Object.values(client.extras || {}).reduce((a,b)=>a+b, 0);
                        html += `<div class="invoice-cell"><div class="invoice-tag missing" onclick="newInvoice('${monthStart}', '${monthEnd}', ${monthHours}, ${est}, event)">MISSING · ~$${est.toLocaleString()}<br>${monthDays} days · ${monthHours}hrs</div></div>`;
                    } else html += `<div class="invoice-cell"></div>`;
                } else html += `<div class="invoice-cell"></div>`;
            }
        } else {
            if (inv) {
                const cls = inv.status === 'paid' ? '' : ' pending';
                html += `<div class="invoice-cell"><div class="invoice-tag${cls}">${inv.number} · $${inv.amount.toLocaleString()}<br>${inv.status}</div></div>`;
            } else if (weekWorkDays > 0) {
                const weekStartDay = monday.getUTCDate();
                const extraSum = weekStartDay <= 7 ? Object.values(client.extras || {}).reduce((a,b)=>a+b, 0) : 0;
                const est = weekHours * client.rate + extraSum;
                html += `<div class="invoice-cell"><div class="invoice-tag missing" onclick="newInvoice('${weekStart}', '${weekEnd}', ${weekHours}, ${est}, event)">MISSING · ~$${est.toLocaleString()}<br>${weekWorkDays} days · ${weekHours}hrs</div></div>`;
            } else html += `<div class="invoice-cell"></div>`;
        }
        html += `</div>`;
    });

    const missing = [];
    weeks.forEach(monday => {
        const fri = new Date(monday); fri.setUTCDate(fri.getUTCDate() + 4);
        const weekStart = fmtDate(monday), weekEnd = fmtDate(fri);
        if (invoices.find(v => v.start && v.end && v.start <= weekEnd && v.end >= weekStart)) return;
        let wh = 0, wd = 0;
        for (let i = 0; i < 5; i++) {
            const d = new Date(monday); d.setUTCDate(d.getUTCDate() + i);
            const e = entryMap[fmtDate(d)];
            const type = e ? e.type : 'work';
            const hrs = e ? (e.hours || 0) : 8;
            if (type === 'work') { wd++; wh += hrs; }
        }
        if (wd > 0) {
            const weekStartDay = monday.getUTCDate();
            const extraSum = weekStartDay <= 7 ? Object.values(client.extras || {}).reduce((a,b)=>a+b, 0) : 0;
            const amt = wh * client.rate + extraSum;
            missing.push({weekLabel: `${shortMonth(monday)} ${monday.getUTCDate()} – ${fri.getUTCDate()}`, date: `${shortMonth(fri)} ${fri.getUTCDate()}`, days: wd, hours: wh, amount: amt});
        }
    });

    if (missing.length && !isMonthly) {
        html += `<div class="summary"><h2>Missing Invoices</h2><table class="summary-table">
            <tr><th>Week</th><th>Invoice Date</th><th>Days</th><th>Hours</th><th class="amount">Amount</th></tr>`;
        let td = 0, th = 0, ta = 0;
        missing.forEach(m => {
            html += `<tr><td>${m.weekLabel}</td><td>${m.date}</td><td>${m.days}</td><td>${m.hours}</td><td class="amount">$${m.amount.toLocaleString()}</td></tr>`;
            td += m.days; th += m.hours; ta += m.amount;
        });
        html += `<tr class="total"><td>Total</td><td></td><td>${td}</td><td>${th}</td><td class="amount">$${ta.toLocaleString()}</td></tr></table></div>`;
    }

    cal.innerHTML = html;
}

async function refreshEntries() {
    entries = await api('/api/billing/entries');
    renderCalendar();
}

async function cycleDay(ds) {
    const entry = entries.find(e => e.date === ds);
    const current = entry ? entry.type : 'work';
    const nextByType = {work: 'vacation', vacation: 'closed', closed: 'delete'};
    const next = nextByType[current] || 'vacation';
    try {
        if (next === 'delete') await api(`/api/billing/entries/${ds}`, {method: 'DELETE'});
        else await api('/api/billing/entries', {method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({date: ds, type: next, hours: next === 'work' ? 8 : 0})});
        await refreshEntries();
    } catch (e) { showMsg(e.message, true); }
}

function closeForm() { if (openForm) { openForm.remove(); openForm = null; } }

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s ?? '';
    return d.innerHTML;
}

async function newInvoice(start, end, hours, amount, ev) {
    ev.stopPropagation();
    closeForm();
    if (!client.billcom_available || !client.billcom_customer_id) { showMsg('bill.com not configured', true); return; }
    const cell = ev.target.closest('.invoice-cell');
    const form = document.createElement('div');
    form.className = 'inv-form';
    form.innerHTML = `
        <div style="font-size:13px;color:#4ade80;font-weight:600">${esc(nextInvNumber)}</div>
        <div class="subtitle" style="font-size:11px">${esc(start)} → ${esc(end)} · ${hours}h · $${amount.toLocaleString()}</div>
        <div id="inv-preview" class="preview"><div class="muted">Loading descriptions…</div></div>
        <div class="inv-form-row">
            <button class="btn-save" onclick="saveInvoice(this, '${start}', '${end}', ${hours}, ${amount})">Create</button>
            <button class="btn-cancel" onclick="closeForm()">Cancel</button>
        </div>`;
    cell.appendChild(form);
    openForm = form;

    const preview = form.querySelector('#inv-preview');
    try {
        const resp = await api(`/api/billing/preview?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
        const descs = (resp && resp.descriptions) || [];
        if (!descs.length) {
            preview.innerHTML = '<div class="muted">No line items.</div>';
        } else {
            preview.innerHTML = descs.map(d => `<div>${esc(d)}</div>`).join('');
        }
    } catch (e) {
        preview.innerHTML = `<div class="muted">Preview failed: ${esc(e.message || String(e))}</div>`;
    }
}

async function saveInvoice(btn, start, end, hours, amount) {
    btn.disabled = true; btn.textContent = '…';
    try {
        await api('/api/billing/invoices', {method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({number: nextInvNumber, start, end, hours, amount, date: end})});
        closeForm();
        showMsg(`Created ${nextInvNumber}`);
        await load();
    } catch (e) {
        btn.disabled = false; btn.textContent = 'Create';
        showMsg(e.message, true);
    }
}

document.addEventListener('click', (e) => {
    if (openForm && !openForm.contains(e.target) && !e.target.closest('.invoice-tag')) closeForm();
});

function showMsg(text, isError = false) {
    const el = document.getElementById('msg');
    el.className = `msg ${isError ? 'msg-err' : 'msg-ok'}`;
    el.textContent = text;
    setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 4000);
}

load().catch(e => showMsg(e.message, true));
</script>
</body>
</html>
