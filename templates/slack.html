<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="utf-8">
<title>Slack — frshty</title>
<script src="/static/tailwind.js"></script>
<script defer src="/static/nav-gate.js"></script>
<style>
body { font-family: 'SF Mono', 'Cascadia Code', monospace; background: #0a0a0a; color: #e0e0e0; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; }
.suggestion { background: #1a1a2a; border: 1px solid #2a2a4a; border-radius: 6px; white-space: pre-wrap; }
.reply-input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; }
.reply-input:focus { border-color: #3b82f6; outline: none; }
.send-btn { background: #2563eb; color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
.send-btn:hover { background: #1d4ed8; }
.send-btn.sent { background: #14532d; cursor: default; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
.badge-mention { background: #1e3a5f; color: #93c5fd; }
.badge-action { background: #713f12; color: #fde047; }
.badge-digest { background: #14532d; color: #86efac; }
nav a { color: #888; padding: 4px 12px; border-radius: 4px; }
nav a:hover, nav a.active { color: #fff; background: #222; }
</style>
</head>
<body class="p-4 max-w-7xl mx-auto">
<header class="flex items-center gap-4 mb-4">
    <h1 class="text-lg font-bold">Slack</h1>
    <nav class="flex gap-1 text-sm">
        <a href="/">Feed</a>
        <a href="/reviews">Reviews</a>
        <a href="/tickets">Tickets</a>
        <a href="/scheduled">Scheduled</a>
        <a href="/slack" class="active">Slack</a>
        <a href="/timesheet">Timesheet</a>
        <a href="/billing">Billing</a>
        <a href="/config">Config</a>
    </nav>
</header>

<section class="mb-6">
    <h2 class="text-sm font-bold text-yellow-400 mb-2">Mentions & Suggested Replies</h2>
    <div id="mentions" class="space-y-3"></div>
</section>

<section class="mb-6">
    <h2 class="text-sm font-bold text-blue-400 mb-2">Actionable Items</h2>
    <div id="actionable" class="space-y-2"></div>
</section>

<section>
    <h2 class="text-sm font-bold text-green-400 mb-2">Channel Activity</h2>
    <div id="channels" class="grid gap-2"></div>
</section>

<script>
async function load() {
    const [evResp, slackResp] = await Promise.all([
        fetch('/api/events?limit=100'),
        fetch('/api/slack/data'),
    ]);
    const events = await evResp.json();
    const slackData = await slackResp.json();

    const mentions = events.filter(e => e.event === 'slack_mention_detected');
    const actionable = events.filter(e => e.event === 'slack_actionable_item');

    document.getElementById('mentions').innerHTML = mentions.length
        ? mentions.map(e => {
            const text = e.meta?.text || e.summary;
            const channel = e.meta?.channel || '';
            const suggested = e.meta?.suggested_response || '';
            const replyId = e.meta?.reply_id || '';
            const time = new Date(e.ts).toLocaleTimeString();
            return `<div class="card p-4" id="mention-${replyId}">
                <div class="flex items-center gap-2 mb-2">
                    <span class="badge badge-mention">mention</span>
                    <span class="text-gray-500 text-xs">${channel} — ${time}</span>
                </div>
                <div class="text-sm mb-3">${esc(text)}</div>
                ${replyId ? `<div class="flex gap-2 items-start">
                    <input type="text" id="reply-${replyId}" value="${esc(suggested)}" class="reply-input flex-1 p-2 rounded text-sm" placeholder="type reply...">
                    <button class="send-btn text-sm" onclick="sendReply('${replyId}')">send</button>
                </div>` : ''}
            </div>`;
        }).join('')
        : '<div class="text-gray-600 text-sm">No mentions yet.</div>';

    document.getElementById('actionable').innerHTML = actionable.length
        ? actionable.map(e => {
            const time = new Date(e.ts).toLocaleTimeString();
            return `<div class="card p-3 text-sm">
                <div class="flex items-center gap-2 mb-1">
                    <span class="badge badge-action">action needed</span>
                    <span class="text-gray-500 text-xs">${time}</span>
                </div>
                <div>${esc(e.meta?.text || e.summary)}</div>
            </div>`;
        }).join('')
        : '<div class="text-gray-600 text-sm">Nothing actionable.</div>';

    const digests = slackData.channel_digests || {};
    const cutoff = Date.now() - 2 * 86400 * 1000;
    const channels = Object.entries(digests)
        .filter(([, d]) => d.updated_at && new Date(d.updated_at).getTime() >= cutoff)
        .sort((a, b) => (b[1].updated_at || '').localeCompare(a[1].updated_at || ''));

    document.getElementById('channels').innerHTML = channels.length
        ? channels.map(([name, d]) => {
            const ago = timeAgo(d.updated_at);
            const fresh = d.new_messages > 0;
            return `<div class="card p-3 ${fresh ? 'border-l-2 border-l-green-500' : ''}">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-bold ${fresh ? 'text-green-400' : 'text-gray-400'}">${esc(name)}</span>
                    <span class="text-xs text-gray-600">${d.message_count} msgs · ${ago}</span>
                </div>
                <div class="text-xs text-gray-300">${esc(d.summary)}</div>
            </div>`;
        }).join('')
        : '<div class="text-gray-600 text-sm">No channel activity yet.</div>';
}

function timeAgo(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

async function sendReply(replyId) {
    const input = document.getElementById(`reply-${replyId}`);
    const text = input.value.trim();
    if (!text) return;
    const btn = input.parentElement.querySelector('.send-btn');
    btn.textContent = 'sending...';
    btn.disabled = true;
    const resp = await fetch(`/api/slack/send/${replyId}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text})
    });
    const result = await resp.json();
    if (result.status === 'sent') {
        btn.textContent = 'sent';
        btn.classList.add('sent');
        input.disabled = true;
    } else {
        btn.textContent = 'failed';
        setTimeout(() => { btn.textContent = 'send'; btn.disabled = false; }, 2000);
    }
}

load();
setInterval(load, 5000);
</script>
</body>
</html>
