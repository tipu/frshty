<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta charset="utf-8">
<title>Scheduled — frshty</title>
<script src="/static/tailwind.js"></script>
<style>
body { font-family: 'SF Mono', 'Cascadia Code', monospace; background: #0a0a0a; color: #e0e0e0; }
.card { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; }
.link { color: #60a5fa; }
.link:hover { text-decoration: underline; }
nav a { color: #888; padding: 4px 12px; border-radius: 4px; }
nav a:hover, nav a.active { color: #fff; background: #222; }
.badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
.badge-scheduled { background: #713f12; color: #fde047; }
.badge-ci { background: #1e3a5f; color: #93c5fd; }
.badge-recurring { background: #14532d; color: #86efac; }
</style>
</head>
<body class="p-4">
<header class="flex items-center gap-4 mb-4">
    <h1 class="text-lg font-bold">Scheduled</h1>
    <nav class="flex gap-1 text-sm">
        <a href="/">Feed</a>
        <a href="/reviews">Reviews</a>
        <a href="/tickets">Tickets</a>
        <a href="/scheduled" class="active">Scheduled</a>
        <a href="/slack">Slack</a>
        <a href="/timesheet">Timesheet</a>
        <a href="/billing">Billing</a>
        <a href="/config">Config</a>
    </nav>
</header>

<div id="empty" class="text-gray-500 text-sm hidden">Nothing pending.</div>
<div id="items" class="grid gap-3 max-w-2xl"></div>

<script>
function relTime(iso) {
    const d = new Date(iso);
    const now = Date.now();
    const diff = d - now;
    const abs = Math.abs(diff);
    const mins = Math.floor(abs / 60000);
    const hrs = Math.floor(mins / 60);
    const remMins = mins % 60;
    const label = hrs > 0 ? `${hrs}h ${remMins}m` : `${mins}m`;
    return diff > 0 ? `in ${label}` : `${label} ago`;
}

function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
    });
}

async function reschedule(key) {
    const input = document.getElementById(`time-${key}`);
    const [h, m] = input.value.split(':').map(Number);
    const resp = await fetch('/api/scheduled');
    const items = await resp.json();
    const item = items.find(i => i.key === key);
    if (!item) return;
    const d = new Date();
    d.setHours(h, m, 0, 0);
    const r = await fetch(`/api/scheduled/${key}/reschedule`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({run_at: d.toISOString()}),
    });
    if (r.ok) load();
}

async function load() {
    const resp = await fetch('/api/scheduled');
    const items = await resp.json();
    const el = document.getElementById('items');
    const empty = document.getElementById('empty');

    if (!items.length) {
        el.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    el.innerHTML = items.map(item => {
        if (item.type === 'scheduled_pr') {
            const d = new Date(item.run_at);
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `<div class="card p-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="badge badge-scheduled">pr scheduled</span>
                    <a href="/tickets/${item.key}" class="link font-bold text-sm">${item.key}</a>
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-400 mt-1">
                    <span>fires ${fmtDate(item.run_at)}</span>
                    <span class="text-yellow-400">(${relTime(item.run_at)})</span>
                    <input type="time" value="${hh}:${mm}" id="time-${item.key}" class="bg-gray-900 border border-gray-700 rounded px-1 py-0.5 text-xs text-gray-300" />
                    <button onclick="reschedule('${item.key}')" class="bg-blue-800 hover:bg-blue-700 text-blue-200 px-2 py-0.5 rounded text-xs">Save</button>
                </div>
                ${item.meta.branch ? `<div class="text-xs text-gray-500 mt-1">${item.meta.branch}</div>` : ''}
            </div>`;
        }
        if (item.type === 'recurring') {
            const cadenceLabel = {weekly: 'Weekly', monthly: 'Monthly', daily_19pst: 'Daily 7pm PT'}[item.cadence] || item.cadence;
            const lastRun = item.last_run_at ? `<div class="text-xs text-gray-500 mt-1">Last fired ${fmtDate(item.last_run_at)} (${relTime(item.last_run_at)})</div>` : '<div class="text-xs text-gray-500 mt-1">Never fired</div>';
            return `<div class="card p-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="badge badge-recurring">${cadenceLabel}</span>
                    <span class="font-bold text-sm">${item.task}</span>
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-400 mt-1">
                    <span>fires ${fmtDate(item.run_at)}</span>
                    <span class="text-yellow-400">(${relTime(item.run_at)})</span>
                </div>
                ${lastRun}
            </div>`;
        }
        if (item.type === 'ci_pending') {
            const elapsed = item.checks_started_at ? relTime(item.checks_started_at) : '';
            const prLinks = (item.prs || []).map(p =>
                `<a href="${p.url}" class="link" target="_blank">#${p.id}</a>`
            ).join(' ');
            return `<div class="card p-4">
                <div class="flex items-center gap-2 mb-1">
                    <span class="badge badge-ci">ci pending</span>
                    <a href="/tickets/${item.key}" class="link font-bold text-sm">${item.key}</a>
                    ${prLinks ? `<span class="text-xs">${prLinks}</span>` : ''}
                </div>
                ${elapsed ? `<div class="text-xs text-gray-400">checks running ${elapsed}</div>` : '<div class="text-xs text-gray-400">waiting for checks</div>'}
                ${item.branch ? `<div class="text-xs text-gray-500 mt-1">${item.branch}</div>` : ''}
            </div>`;
        }
        return '';
    }).join('');
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
